<!-- 登录界面 -->
<div id="loginOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;justify-content:center;align-items:center;z-index:1000;flex-direction:column;color:white;font-family:'Microsoft YaHei',sans-serif;">
    <div style="background:#2a2a3e;padding:40px;border-radius:20px;width:320px;text-align:center;box-shadow:0 0 40px rgba(100,100,255,0.3);">
        <h1 style="color:#ffd700;">修仙秘境</h1>
        <p style="color:#aaa;font-size:14px;">登录以保存你的修为</p>
        <div style="margin:20px 0;text-align:left;">
            <label>用户名</label>
            <input id="loginUsername" type="text" placeholder="请输入用户名" style="width:100%;padding:8px;margin:5px 0 15px;border-radius:5px;border:none;background:#3a3a5e;color:white;">
            <label>密码</label>
            <input id="loginPassword" type="password" placeholder="请输入密码" style="width:100%;padding:8px;margin:5px 0 15px;border-radius:5px;border:none;background:#3a3a5e;color:white;">
        </div>
        <button id="loginBtn" style="background:#4a7aff;color:white;border:none;padding:10px 30px;border-radius:8px;cursor:pointer;font-size:16px;width:100%;">登录</button>
        <p style="margin-top:10px;font-size:13px;color:#aaa;">还没有账号？ <span id="showRegister" style="color:#4a7aff;cursor:pointer;">注册</span></p>
        <div id="loginMessage" style="margin-top:10px;color:#ff6b6b;font-size:14px;"></div>
    </div>
</div>

<!-- 注册界面（初始隐藏） -->
<div id="registerOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:1001;flex-direction:column;color:white;font-family:'Microsoft YaHei',sans-serif;">
    <div style="background:#2a2a3e;padding:40px;border-radius:20px;width:320px;text-align:center;box-shadow:0 0 40px rgba(100,100,255,0.3);">
        <h1 style="color:#ffd700;">注册</h1>
        <div style="margin:20px 0;text-align:left;">
            <label>用户名</label>
            <input id="registerUsername" type="text" placeholder="请设置用户名" style="width:100%;padding:8px;margin:5px 0 15px;border-radius:5px;border:none;background:#3a3a5e;color:white;">
            <label>密码</label>
            <input id="registerPassword" type="password" placeholder="请设置密码" style="width:100%;padding:8px;margin:5px 0 15px;border-radius:5px;border:none;background:#3a3a5e;color:white;">
            <label>确认密码</label>
            <input id="registerPasswordConfirm" type="password" placeholder="请再次输入密码" style="width:100%;padding:8px;margin:5px 0 15px;border-radius:5px;border:none;background:#3a3a5e;color:white;">
        </div>
        <button id="registerBtn" style="background:#6c5ce7;color:white;border:none;padding:10px 30px;border-radius:8px;cursor:pointer;font-size:16px;width:100%;">注册</button>
        <p style="margin-top:10px;font-size:13px;color:#aaa;">已有账号？ <span id="showLogin" style="color:#4a7aff;cursor:pointer;">去登录</span></p>
        <div id="registerMessage" style="margin-top:10px;color:#ff6b6b;font-size:14px;"></div>
    </div>
</div>



<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>修仙 · 秘境争锋</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #1a1a2e; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e0e0e0;
            font-family: 'Microsoft YaHei', sans-serif;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            user-select: none;
            pointer-events: none;
        }
        #ui .name { font-size: 18px; color: #ffd700; }
        #ui .realm { font-size: 14px; color: #7ec8e3; }
        #ui .hp-bar {
            width: 150px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-top: 5px;
        }
        #ui .hp-fill {
            height: 100%;
            width: 100%;
            background: #e74c3c;
            border-radius: 3px;
            transition: width 0.2s;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-family: 'Microsoft YaHei', sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#aaa;margin-top:2px;">
        <span id="expText">0 / 100</span>
        <span id="expPercent">0%</span>
    </div>
    <div id="ui">
        <div class="name" id="playerName">---</div>
        <div class="realm" id="playerRealm">境界：---</div>
        <div class="hp-bar"><div class="hp-fill" id="playerHp"></div></div>
    </div>
    <div id="info">🖱️ 移动鼠标控制修仙者 · 更多玩法开发中...</div>
    <canvas id="gameCanvas"></canvas>

    <!-- 引入 socket.io 客户端库 -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- 引入游戏客户端逻辑 -->
    <script type="module" src="/client.js"></script>
</body>
</html>
